<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Shohoj Sheba</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css"> <style>
        /* 1. LOGO COLORS (All White) */
        .logo, .logo .logo-accent { color: #ffffff !important; text-decoration: none; }
        .logo-mark { background: #ffffff !important; color: #0f1f3d !important; border-radius: 8px; padding: 5px; }
        
        /* 2. LAYOUT FIXES */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; position: absolute; width: 100%; top: 0; z-index: 100; }
        .nav-actions .nav-hint { color: rgba(255,255,255,0.7); margin-right: 10px; }
        .nav-btn-solid { background: #ffffff; color: #0f1f3d; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }

        /* 3. WORKER MODE TRANSITION */
        .login-left { transition: background-color 0.4s ease; background-color: #0f1f3d; }
        .login-left.worker-mode { background-color: #1b5e20 !important; }
        .worker-mode ~ .login-right .login-btn { background-color: #2e7d32 !important; }
    </style>
</head>
<body>

<header>
    <div class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-mark"><i class="fa-solid fa-house-chimney"></i></div>
            <span>Shohoj<span class="logo-accent">Sheba</span></span>
        </a>
        <div class="nav-actions">
            <span class="nav-hint">Already a member?</span>
            <a href="login.html" class="nav-btn-solid">Log In</a>
        </div>
    </div>
</header>

<main class="login-page">
    <div class="login-left" id="sidePanel">
        <div class="login-left-overlay"></div>
        <div class="login-left-content">
            <h2>Join <span>Shohoj Sheba</span></h2>
            <p>Your local partner for expert home services.</p>
        </div>
    </div>

    <div class="login-right">
        <div class="login-form-wrap">
            <h1 class="form-title">Create Account</h1>
            
            <div class="role-toggle">
                <input type="radio" name="role" id="role-user" value="user" checked>
                <label for="role-user" class="role-label">User</label>
                <input type="radio" name="role" id="role-worker" value="worker">
                <label for="role-worker" class="role-label">Worker</label>
            </div>

            <form id="finalSignupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrap">
                        <input type="text" id="fname" placeholder="Full Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrap">
                        <input type="email" id="femail" placeholder="Email Address" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input type="password" id="fpass" placeholder="At least 6 characters" required>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="fbtn">
                    <span id="btnTxt">Create Account</span>
                </button>
            </form>
        </div>
    </div>
</main>

<script>
    // THE LOGIC
    const signupForm = document.getElementById('finalSignupForm');
    
    signupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        console.log("Button Clicked!"); // Check your browser console (F12)

        const name = document.getElementById('fname').value;
        const email = document.getElementById('femail').value;
        const password = document.getElementById('fpass').value;
        const role = document.querySelector('input[name="role"]:checked').value;

        if (password.length < 6) {
            alert("Password is too short!");
            return;
        }

        // Show loading state
        document.getElementById('btnTxt').innerText = "Processing...";
        document.getElementById('fbtn').disabled = true;

        // Save to browser memory
        const users = JSON.parse(localStorage.getItem('shohoj_sheba_users') || '[]');
        users.push({ name, email, password, role });
        localStorage.setItem('shohoj_sheba_users', JSON.stringify(users));

        // Success
        setTimeout(() => {
            alert("Signup Successful! Redirecting to login...");
            window.location.href = 'login.html';
        }, 1000);
    });

    // Toggle colors
    document.querySelectorAll('input[name="role"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const panel = document.getElementById('sidePanel');
            this.value === 'worker' ? panel.classList.add('worker-mode') : panel.classList.remove('worker-mode');
        });
    });
</script>
</body>
</html>
