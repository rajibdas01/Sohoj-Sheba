<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard — Shohoj Sheba</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">

    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-house-chimney"></i>
            <span>Shohoj<span style="color:var(--primary-green)">Sheba</span></span>
        </div>
        
        <div class="nav-menu">
            <a href="#" class="nav-item active" data-page="overview">
                <i class="fa-solid fa-gauge-high"></i> Overview
            </a>
            <a href="#" class="nav-item" data-page="bookings">
                <i class="fa-solid fa-calendar-check"></i> My Bookings
            </a>
            <a href="#" class="nav-item" data-page="services">
                <i class="fa-solid fa-hand-holding-hand"></i> Book Service
            </a>
            <a href="#" class="nav-item" data-page="profile">
                <i class="fa-solid fa-circle-user"></i> Profile
            </a>
        </div>

        <button id="logoutBtn" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </nav>

    <div class="main-content">
        <header class="content-header">
            <h1 id="pageTitle">User Overview</h1>
        </header>

        <section id="overview-page" class="content-section active">
            <div class="welcome-msg">
                <h2>Hello, User! 👋</h2>
                <p>Manage your home services and active bookings here.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <h3>3</h3>
                    <p>Active Bookings</p>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-wallet"></i>
                    <h3>৳2,500</h3>
                    <p>Spent This Month</p>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-award"></i>
                    <h3>Gold</h3>
                    <p>Member Status</p>
                </div>
            </div>
        </section>

        <section id="bookings-page" class="content-section">
            <h2>Your Recent Bookings</h2>
            <div class="stat-card" style="width: 100%; margin-top: 20px;">
                <p><strong>Plumbing Repair</strong> - Scheduled for March 15</p>
                <span style="color: var(--primary-green);">Status: Confirmed</span>
            </div>
        </section>

    </div>

    <script src="dashboard.js"></script>
</body>
</html>
