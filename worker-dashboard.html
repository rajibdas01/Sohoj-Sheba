<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worker Dashboard — Shohoj Sheba</title>
    <link rel="stylesheet" href="dashboard-styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">

    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fa-solid fa-house-chimney"></i>
            <span>Shohoj<span style="color:var(--primary-green)">Sheba</span></span>
        </div>
        
        <div class="nav-menu">
            <a href="#" class="nav-item active" data-page="overview">
                <i class="fa-solid fa-gauge"></i> Overview
            </a>
            <a href="#" class="nav-item" data-page="available">
                <i class="fa-solid fa-briefcase"></i> Available Jobs
            </a>
            <a href="#" class="nav-item" data-page="earnings">
                <i class="fa-solid fa-money-bill-wave"></i> Earnings
            </a>
            <a href="#" class="nav-item" data-page="profile">
                <i class="fa-solid fa-user"></i> Profile
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="user-badge">
                <i class="fa-solid fa-circle-user"></i>
                <span>worker@email.com</span>
            </div>
            <button id="logoutBtn" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </nav>

    <div class="main-content">
        <header class="content-header">
            <h1 id="pageTitle">Overview</h1>
        </header>

        <section id="overview-page" class="content-section active">
            <div class="welcome-msg">
                <h2>Welcome, Worker! 💪</h2>
                <p>You have 5 new job opportunities waiting.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fa-solid fa-calendar-check"></i>
                    <h3>12</h3>
                    <p>Jobs Completed</p>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-star"></i>
                    <h3>4.8</h3>
                    <p>Average Rating</p>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-wallet"></i>
                    <h3>৳15,200</h3>
                    <p>Total Earnings</p>
                </div>
            </div>
        </section>

        </div>

    <script src="dashboard.js"></script>
</body>
</html>
